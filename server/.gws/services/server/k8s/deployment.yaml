apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  labels:
    app: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
      - name: server
        image: server
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "5000"
        - name: NODE_ENV
          value: "development"
        - name: DATABASE_URL
          value: "postgresql://devuser:devpassword@postgresql:5432/pern_dev"
        - name: CLIENT_URL
          value: "https://client.pern-stack.local.getwebstack.dev:9443"
        - name: JWT_SECRET
          value: "qa-e2e-jwt-secret-do-not-use-in-prod"
        - name: JWT_EXPIRES_IN
          value: "7d"
      restartPolicy: Always
